services:
  # 1. Configuración de la API de FastAPI
  - type: web
    name: kaab-terra-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kaab-terra-db
          property: connectionString
      - key: SECRET_KEY
        value: kaab_terra_super_secret_key_change_me_in_production

# 2. Configuración de la Base de Datos PostgreSQL en la nube
databases:
  - name: kaab-terra-db
    plan: free